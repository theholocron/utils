packages:
  - "packages/*"

catalogs:
  # Holocron CLI and plugins — pinned in lockstep; bump together when running setup.
  holocron:
    '@theholocron/cli': ^2.2.1
    '@theholocron/holocron-config': ^7.5.0
    '@theholocron/holocron-plugin-github': ^2.2.1
  # Shared configs — release in lockstep; bump all entries together.
  configs:
    '@theholocron/commitlint-config': ^7.5.0
    '@theholocron/eslint-config': ^7.5.0
    '@theholocron/lint-staged-config': ^7.5.0
    '@theholocron/prettier-config': ^7.5.0
    '@theholocron/tsdown-config': ^7.5.0
    '@theholocron/vitest-config': ^7.5.0
